                                    </div>
                                )}

                                <div className="absolute top-0 bottom-0 pointer-events-none z-0" style={{ left: `${totalLeftWidth}px`, width: `${timelineWidth}px` }}>
                                   {bottomLabels.map((lbl, i) => (
                                       <div key={`grid-${i}`} className={`absolute top-0 bottom-0 border-r ${lbl.isHoliday && scale === 'day' ? 'bg-slate-200/50 border-slate-200' : 'border-slate-50'}`} style={getLabelStyle(lbl)}></div>
                                   ))}
                                </div>

                                {displayItems.map((item) => (
                                    <GanttRow 
                                        isEditMode={isEditMode}
                                        key={item.id} 
                                        item={item} 
                                        level={item.level} 
                                        minDate={minDate} 
                                        dayWidth={dragDayWidth}
                                        getDateX={getDateX}
                                        getDateCenterX={getDateCenterX}
                                        getRangeWidth={getRangeWidth}
                                        onUpdateField={onUpdateField}
                                        onOpenAddMenu={handleOpenAddMenu}
                                        onDelete={onDelete}
                                        updateDates={updateDates}
                                        onPreviewDates={previewDates}
                                        allItems={items}
                                        toggleCollapse={toggleCollapse}
                                        colWidths={colWidths}
                                        totalLeftWidth={totalLeftWidth}
                                        onContextMenu={handleContextMenu}
                                        isDrawingTarget={drawingState.active && drawingState.sourceId !== item.id}
                                        completeDrawing={completeDrawing}
                                        scrollContainerRef={scrollRef}
                                        frozenColumn={frozenColumn}
                                        handleAddNewRoot={handleAddNewRoot}
                                        pinnedOrder={pinnedOrder}
                                    />
                                ))}
                                {displayItems.length === 0 && (
                                    <div className="p-10 text-center text-slate-500 italic">No tasks found. Create a project to start tracking.</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {contextMenu.visible && (
                        <div 
                            className="context-menu-popup fixed bg-white border border-slate-200 shadow-xl rounded-lg py-1 z-[9999] min-w-[160px] text-sm"
                            style={{ top: contextMenu.y, left: contextMenu.x }}
                        >
                            {contextMenu.type === 'task' ? (
                                <>
                                    {(() => {
                                        const targetTask = items.find(i => i.id === contextMenu.targetId);
                                        if (targetTask && targetTask.type !== 'Milestone' && !displayItems.some(i => i.parentId === contextMenu.targetId)) {
                                            return (
                                                <>
                                                    <div className="px-3 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 mb-1">
                                                        Update Progress
                                                    </div>
                                                    <div className="px-4 py-2">
                                                        <input 
                                                            type="number" 
                                                            min="0" max="100" 
                                                            className="w-full border border-slate-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            placeholder="%"
                                                            defaultValue={Math.round(targetTask.progress || 0)}
                                                            onKeyDown={(e) => {
                                                                if (e.key === 'Enter') {
                                                                    let val = parseInt(e.target.value);
                                                                    if (isNaN(val)) val = 0;
                                                                    if (val > 100) val = 100;
                                                                    if (val < 0) val = 0;
                                                                    onUpdateField(contextMenu.targetId, 'progress', val);
                                                                    setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                                                                }
                                                            }}
                                                        />
                                                    </div>
                                                </>
                                            );
                                        }
                                        return null;
                                    })()}
                                    <div className="px-3 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 mb-1">
                                        Dependency
                                    </div>
                                    <button 
                                        className="w-full text-left px-4 py-2 hover:bg-blue-50 hover:text-blue-600 transition-colors flex items-center gap-2"
                                        onClick={() => {
                                            startDrawing(contextMenu.targetId);
                                            setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                                        }}
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        Add Dependency
                                    </button>
                                    
                                    {(() => {
                                        const tTask = displayItems.find(i => i.id === contextMenu.targetId);
                                        const hasIncoming = tTask?.predecessors?.length > 0;
                                        const hasOutgoing = displayItems.some(i => (i.predecessors || []).includes(contextMenu.targetId));
                                        return (hasIncoming || hasOutgoing) ? (
                                            <button 
                                                className="w-full text-left px-4 py-2 hover:bg-rose-50 hover:text-rose-600 transition-colors flex items-center gap-2"
                                                onClick={() => {
                                                    handleRemoveDependencies(contextMenu.targetId);
                                                    setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                                                }}
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                                Remove Connections
                                            </button>
                                        ) : null;
                                    })()}
                                </>
                            ) : contextMenu.type === 'line' ? (
                                <>
                                    <div className="px-3 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 mb-1">
                                        Connection
                                    </div>
                                    <button 
                                        className="w-full text-left px-4 py-2 hover:bg-rose-50 hover:text-rose-600 transition-colors flex items-center gap-2"

                                            setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });

                                                    <button 
                                                        className="w-full text-left px-4 py-2 hover:bg-slate-50 transition-colors flex items-center gap-2 text-slate-700"
                                                        onClick={() => {
                                                            onAddChild(tsk.id, 'Milestone', 'child');
                                                            setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                                                        }}
                                                    >
                                                        <Icons.Milestone /> Add Milestone
                                                    </button>
                                                </>
                                            )}
                                            {tsk.type === 'Job' && (
                                                <>
                                                    <button 
                                                        className="w-full text-left px-4 py-2 hover:bg-slate-50 transition-colors flex items-center gap-2 text-slate-700"
                                                        onClick={() => {
                                                            onAddChild(tsk.id, 'Job', 'sibling');

                                                        onClick={() => {
                                                            onAddChild(tsk.id, 'Task', 'child');

                    })()}
                </div>
            );
        };

        const parseCSVLine = (line) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        };

        const CSV_HEADER = "ID,ParentID,Type,TaskName,PIC,Status,Progress,StartDate,EndDate,Priority,Remark,SortOrder,Predecessors,ProgressUpdates";

        const exportToCSV = (items) => {
            let csvContent = "data:text/csv;charset=utf-8," + CSV_HEADER + "\n";
            items.sort((a,b) => a.sortOrder - b.sortOrder).forEach(item => {
                const preds = (item.predecessors || []).join(';');
                const progressUpdates = JSON.stringify(item.progressUpdates || []).replace(/"/g, '""');
                const row = [
                    item.id, item.parentId || "", item.type, `"${item.taskName.replace(/"/g, '""')}"`,
                    `"${item.pic || ''}"`, item.status || '', Math.round(item.progress || 0), item.startDate || '', item.endDate || '',
                    item.type === 'Job' ? `"${item.priority || ''}"` : '',
                    `"${item.remark || ''}"`, item.sortOrder, `"${preds}"`, `"${progressUpdates}"`
                ];
                csvContent += row.join(",") + "\n";
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `project_export_${getTodayStr()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        const escapeXml = (unsafe) => {
            if (unsafe === undefined || unsafe === null) return '';
            return unsafe.toString().replace(/[<>&'"]/g, function (c) {
                switch (c) {
                    case '<': return '&lt;'; case '>': return '&gt;';
                    case '&': return '&amp;'; case '\'': return '&apos;';
                    case '"': return '&quot;'; default: return c;
                }
            });
        };

        const exportToExcel = async (items, customHolidays = []) => {
            const buildExportTree = (parentId, level) => {
                return items
                    .filter(i => i.parentId === parentId)
                    .sort((a,b) => a.sortOrder - b.sortOrder)
                    .flatMap(item => {
                        const node = { ...item, level };
                        return [node, ...buildExportTree(item.id, level + 1)];
                    });
            };
            const exportItems = buildExportTree(null, 0);

            const allDates = exportItems.flatMap(i => {
                const dates = [];
                if (i.startDate) dates.push(parseDate(i.startDate));
                if (i.endDate) dates.push(parseDate(i.endDate));
                if (i.milestoneConfig && i.milestoneConfig.items) {
                    i.milestoneConfig.items.forEach(mi => {
                        if (mi.date) dates.push(parseDate(mi.date));
                        if (mi.startDate) dates.push(parseDate(mi.startDate));
                        if (mi.endDate) dates.push(parseDate(mi.endDate));
                    });
                }
                return dates;
            });

            let minDate = new Date();
            let maxDate = new Date();
            if (allDates.length > 0) {
                minDate = new Date(Math.min(...allDates));
                maxDate = new Date(Math.max(...allDates));
            }
            minDate.setDate(minDate.getDate() - 3); 
            maxDate.setDate(maxDate.getDate() + 7); 

            const totalDays = diffDays(formatDate(minDate), formatDate(maxDate));
            const datesArray = [];
            let currentDate = new Date(minDate);
            for (let i = 0; i <= totalDays; i++) {
                datesArray.push(new Date(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }

            const todayMs = parseDate(getTodayStr()).getTime();

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Project Schedule');
            
            worksheet.views = [
                { 
                    showGridLines: true,
                    state: 'frozen',
                    xSplit: 8, 
                    ySplit: 2, 
                    activeCell: 'I3' 
                }
            ];

            const baseCols = [
                { header: 'Type', key: 'type', width: 15 },
                { header: 'Task Name', key: 'name', width: 35 },
                { header: 'PIC', key: 'pic', width: 12 },
                { header: 'Status', key: 'status', width: 15 },
                { header: 'Progress', key: 'progress', width: 10 },
                { header: 'Start Date', key: 'start', width: 15 },
                { header: 'End Date', key: 'end', width: 15 },
                { header: 'Priority', key: 'priority', width: 12 },
                { header: 'Remark', key: 'remark', width: 25 }
            ];

            const dateCols = datesArray.map(d => ({
                header: `${d.getDate()}\n${d.toLocaleDateString('en-US', {month:'short'})}`,
                key: `date_${d.getTime()}`,
                width: 4
            }));

            worksheet.columns = [...baseCols, ...dateCols];

            worksheet.insertRow(1, []);
            const exportRow = worksheet.getRow(1);
            exportRow.height = 25;
            const now = new Date();
            const exportText = `Exported at: ${now.getDate()} ${now.toLocaleDateString('en-US', { month: 'short' })} ${now.getFullYear()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            exportRow.getCell(1).value = exportText;
            exportRow.getCell(1).font = { name: 'Segoe UI', size: 10, color: { argb: 'FF475569' }, italic: true, bold: true };
            exportRow.getCell(1).alignment = { vertical: 'middle', horizontal: 'left' };
            worksheet.mergeCells(1, 1, 1, 9);

            worksheet.getRow(2).height = 30;
            const customDateMap = new Map((customHolidays || []).map(h => [h.date, { type: h.type || 'holiday', label: h.label || '' }]));
            worksheet.getRow(2).eachCell((cell, colNumber) => {
                cell.font = { name: 'Segoe UI', size: 9, color: { argb: 'FFFFFFFF' }, bold: true };
                cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };

                if (colNumber <= 9) {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF475569' } };
                } else {
                    const d = datesArray[colNumber - 10];
                    const dStr = formatDate(d);
                    const specialDateInfo = customDateMap.get(dStr);
                    const exceptionType = specialDateInfo?.type;

                    if (specialDateInfo?.label) {
                        cell.note = specialDateInfo.label;
                    }
                    
                    let isWeekend = false;
                    if (exceptionType === 'working_day' || exceptionType === 'workday') {
                        isWeekend = false;
                    } else if (exceptionType === 'holiday') {
                        isWeekend = true;
                    } else {
                        isWeekend = d.getDay() === 0 || d.getDay() === 6;
                    }

                    const isToday = d.getTime() === todayMs;
                    cell.font = { name: 'Segoe UI', size: 8, color: { argb: isToday ? 'FFFFFFFF' : (isWeekend ? 'FF94A3B8' : 'FF475569') }, bold: isToday };
                    if (isToday) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEF4444' } };
                    } else if (isWeekend) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } }; 
                    }
                }
            });

            const formatExcelDate = (dateStr) => {
                if (!dateStr) return '';
                const d = parseDate(dateStr);
                return `${d.getDate()} ${d.toLocaleDateString('en-US', { month: 'short' })} ${d.getFullYear()}`;
            };

            const hexToArgb = (hex) => {
                if (!hex) return 'FF3B82F6';
                let cleanHex = hex.replace('#', '');
                if (cleanHex.length === 3) cleanHex = cleanHex.split('').map(c => c + c).join('');
                return 'FF' + cleanHex.toUpperCase();
            };

            exportItems.forEach((item, rowIndex) => {
                const rowNumber = rowIndex + 3; 
                const row = worksheet.getRow(rowNumber);
                row.height = 20;

                const isProj = item.type === 'Project' || item.type === 'Job';
                const fontStyle = { name: 'Segoe UI', size: 10, color: { argb: 'FF1E293B' }, bold: isProj };
                const indentSpaces = '    '.repeat(item.level);

                row.getCell(1).value = indentSpaces + item.type;
                row.getCell(2).value = indentSpaces + item.taskName;
                row.getCell(3).value = item.pic;
                row.getCell(4).value = item.status;
                row.getCell(5).value = (item.progress || 0) / 100;
                row.getCell(5).numFmt = '0%';
                row.getCell(6).value = formatExcelDate(item.startDate);
                row.getCell(7).value = formatExcelDate(item.endDate);
                row.getCell(8).value = item.type === 'Job' ? (item.priority || '') : '';
                row.getCell(9).value = item.remark;
                
                for(let i=1; i<=9; i++) {
                    const cell = row.getCell(i);
                    cell.font = (i === 9) ? { ...fontStyle, bold: false } : fontStyle;
                    cell.alignment = { vertical: 'middle' };
                }

                const priorityCell = row.getCell(8);
                if (item.type === 'Job' && item.priority) {
                    priorityCell.alignment = { vertical: 'middle', horizontal: 'center' };
                    const pStyles = {
                        'High': { font: 'FF9F1239', bg: 'FFFFE4E6' },
                        'Medium': { font: 'FFB45309', bg: 'FFFEF3C7' },
                        'Low': { font: 'FF065F46', bg: 'FFD1FAE5' }
                    };
                    const pSt = pStyles[item.priority];
                    if (pSt) {
                        priorityCell.font = { name: 'Segoe UI', size: 9, color: { argb: pSt.font }, bold: true };
                        priorityCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: pSt.bg } };
                    }
                }

                const statusCell = row.getCell(4);
                statusCell.alignment = { vertical: 'middle', horizontal: 'center' };
                const statusStyles = {
                    'Complete': { font: 'FF065F46', bg: 'FFD1FAE5' },
                    'Delay': { font: 'FF9F1239', bg: 'FFFFE4E6' },
                    'In Progress': { font: 'FF1E40AF', bg: 'FFDBEAFE' },
                    'Not Started': { font: 'FF1E293B', bg: 'FFF1F5F9' }
                };
                const st = statusStyles[item.status] || statusStyles['Not Started'];
                statusCell.font = { name: 'Segoe UI', size: 9, color: { argb: st.font }, bold: true };
                statusCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: st.bg } };

                const startD = item.startDate ? parseDate(item.startDate) : null;
                const endD = item.endDate ? parseDate(item.endDate) : null;
                if (startD) startD.setHours(0,0,0,0);
                if (endD) endD.setHours(0,0,0,0);

                const getBaseStatusColor = (status) => {
                    if (status === 'Complete') return 'FFD1FAE5';
                    if (status === 'Delay') return 'FFFFE4E6';
                    if (status === 'In Progress') return 'FFDBEAFE';
                    return 'FFF1F5F9';
                };
                const baseStatusColor = getBaseStatusColor(item.status);

                let progressDays = 0;
                if (startD && endD) {
                    const totalTaskDays = diffDays(formatDate(startD), formatDate(endD)) + 1;
                    progressDays = Math.round(totalTaskDays * (item.progress || 0) / 100);
                }

                for (let i = 0; i < datesArray.length; i++) {
                    const d = datesArray[i];
                    d.setHours(0,0,0,0);
                    const dStr = formatDate(d);
                    const colNumber = i + 10;
                    const cell = row.getCell(colNumber);

                    let cellColor = null; 
                    let cellText = null;
                    let fontColor = 'FF333333';

                    let isMilestoneCell = false;
                    if (item.type === 'Milestone') {
                        const config = item.milestoneConfig || { items: [] };
                        
                        if (config.type === 'star') {
                            const mItem = config.items.find(mi => mi.date && formatDate(parseDate(mi.date)) === dStr);
                            if (mItem) {
                                cellColor = hexToArgb(mItem.color || '#f59e0b');
                                cellText = mItem.label || '';
                                fontColor = 'FFFFFFFF';
                                isMilestoneCell = true;
                            }
                        } else if (config.type === 'arrow') {
                            let mItem = config.items.find(mi => mi.startDate && formatDate(parseDate(mi.startDate)) === dStr);
                            if (mItem) {
                                cellColor = hexToArgb(mItem.color || '#3b82f6');
                                cellText = mItem.label || '';
                                fontColor = 'FFFFFFFF';
                                isMilestoneCell = true;
                            } else {
                                mItem = config.items.find(mi => {
                                    if (!mi.startDate || !mi.endDate) return false;
                                    const sDate = parseDate(mi.startDate);
                                    const eDate = parseDate(mi.endDate);
                                    sDate.setHours(0,0,0,0);
                                    eDate.setHours(0,0,0,0);
                                    return d > sDate && d <= eDate;
                                });
                                if (mItem) {
                                    cellColor = hexToArgb(mItem.color || '#3b82f6');
                                    isMilestoneCell = true;
                                }
                            }
                        }
                    }

                    if (item.type !== 'Milestone' && startD && endD && d >= startD && d <= endD) {
                        const currentDayIndex = Math.round(diffDays(formatDate(startD), formatDate(d)));
                        const isDonePortion = currentDayIndex < progressDays;

                        if (isDonePortion) {
                            cellColor = 'FF34D399'; 
                            fontColor = 'FF064E3B';
                        } else {
                            cellColor = baseStatusColor;
                            const colors = { 'Complete': 'FF065F46', 'Delay': 'FF9F1239', 'In Progress': 'FF1E40AF' };
                            fontColor = colors[item.status] || 'FF1E293B';
                        }

                        if (d.getTime() === startD.getTime() || (i === 0 && d > startD)) {
                            cellText = `${item.taskName} ${Math.round(item.progress || 0)}%`;
                        }
                    }

                    if (cellColor) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: cellColor } };
                    }
                    
                    if (cellText) {
                        cell.value = cellText;
                        cell.font = { name: 'Segoe UI', size: 8, color: { argb: fontColor }, bold: true };
                        cell.alignment = { vertical: 'middle', horizontal: isMilestoneCell ? 'center' : 'left', wrapText: false };
                    }
                }
            });

            const todayIndex = datesArray.findIndex(d => d.getTime() === todayMs);
            if (todayIndex !== -1) {
                const todayCol = todayIndex + 10;
                const canvas = document.createElement('canvas');
                canvas.width = 10; canvas.height = 10;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(0, 0, 10, 10);
                
                const imageId = workbook.addImage({
                    base64: canvas.toDataURL('image/png'),
                    extension: 'png',
                });

                worksheet.addImage(imageId, {
                    tl: { col: todayCol - 1, row: 1 }, 
                    br: { col: todayCol - 1 + 0.1, row: exportItems.length + 2 }, 
                    editAs: 'twoCell' 
                });
            }

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            saveAs(blob, `PEB_Project_Plan_${getTodayStr()}.xlsx`);
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [history, setHistory] = useState([]);
            const [view, setView] = useState('dashboard');
            const [scale, setScale] = useState('day');
            const [isEditMode, setIsEditMode] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);
            const [collapsedIds, setCollapsedIds] = useState([]);
            const [frozenColumn, setFrozenColumn] = useState('status');
            const [dbError, setDbError] = useState(null);
            const [colWidths, setColWidths] = useState({
                taskName: 200, pic: 48, progress: 55, startDate: 80, endDate: 80, priority: 70, status: 75, remark: 90, act: 48
            });
            const [picFilter, setPicFilter] = useState(['All']);
            const [statusFilter, setStatusFilter] = useState(['All']);
            const [selectedProjects, setSelectedProjects] = useState(['All']);
            const [isProjectFilterOpen, setIsProjectFilterOpen] = useState(false);
            const [isExportMenuOpen, setIsExportMenuOpen] = useState(false);
            
            const [customHolidays, setCustomHolidays] = useState([]);
            const [isHolidayModalOpen, setIsHolidayModalOpen] = useState(false);
            const [newHoliday, setNewHoliday] = useState({ date: getTodayStr(), label: '', type: 'holiday' });

            const fileInputRef = useRef(null);
            const dragStartStateRef = useRef(null);
            const allPics = useMemo(() => [...new Set(items.filter(i => i.type === 'Job' && i.pic && i.pic.trim() !== '').map(i => i.pic))].sort(), [items]);
            const allStatuses = useMemo(() => {
                const activeStatuses = new Set(items.filter(i => i.type === 'Job' && i.status).map(i => i.status));
                return ['Not Started', 'In Progress', 'Delay', 'Complete'].filter(st => activeStatuses.has(st));
            }, [items]);
            const hasActiveFilters = !selectedProjects.includes('All') || !picFilter.includes('All') || !statusFilter.includes('All');
            const activeFilterCount = 
                (selectedProjects.includes('All') ? 0 : selectedProjects.length) +
                (picFilter.includes('All') ? 0 : picFilter.length) +
                (statusFilter.includes('All') ? 0 : statusFilter.length);
            const matchesFilter = (value, selectedValues) => selectedValues.includes('All') || selectedValues.includes(value);

            const displayedItems = useMemo(() => {
                if (selectedProjects.includes('All')) return items;
                const keep = new Set(selectedProjects);
                const addDescendants = (parentId) => {
                    items.filter(i => i.parentId === parentId).forEach(child => {
                        keep.add(child.id);
                        addDescendants(child.id);
                    });
                };
                selectedProjects.forEach(addDescendants);
                return items.filter(i => keep.has(i.id));
            }, [items, selectedProjects]);

            const getOnlyShowedItems = () => {
                const baseItems = displayedItems;
                if (picFilter.includes('All') && statusFilter.includes('All')) return baseItems;

                const matches = baseItems.filter(i => {
                    if (i.type !== 'Job') return false;
                    let passPic = matchesFilter(i.pic, picFilter);
                    let passStatus = matchesFilter(i.status, statusFilter);
                    return passPic && passStatus;
                });

                const visibleIds = new Set();
                const addAncestors = (id) => {
                    if (!id || visibleIds.has(id)) return;
                    visibleIds.add(id);
                    const item = baseItems.find(i => i.id === id);
                    if (item && item.parentId) addAncestors(item.parentId);
                };
                const addDescendants = (id) => {
                    if (!id) return;
                    visibleIds.add(id);
                    baseItems.filter(i => i.parentId === id).forEach(child => addDescendants(child.id));
                };

                matches.forEach(m => { addAncestors(m.id); addDescendants(m.id); });
                return baseItems.filter(i => visibleIds.has(i.id));
            };

            const autoSizeColumns = (currentItems) => {
                let maxTaskName = 200;
                let maxPic = 48;
                let maxStatus = 75;

                const getLevel = (id, itemsRef, currentLevel = 0) => {
                    const node = itemsRef.find(i => i.id === id);
                    if (node && node.parentId) return getLevel(node.parentId, itemsRef, currentLevel + 1);
                    return currentLevel;
                };

                currentItems.forEach(item => {
                    const level = getLevel(item.id, currentItems);
                    const taskNameWidth = (item.taskName?.length || 0) * 7.5 + (level * 24) + 80;
                    if (taskNameWidth > maxTaskName) maxTaskName = taskNameWidth;
                    const picWidth = (item.pic?.length || 0) * 7.5 + 24;
                    if (picWidth > maxPic) maxPic = picWidth;
                    const statusWidth = (item.status?.length || 0) * 7.5 + 32;
                    if (statusWidth > maxStatus) maxStatus = statusWidth;
                });

                setColWidths(prev => ({
                    ...prev,
                    taskName: Math.max(prev.taskName, maxTaskName),
                    pic: Math.max(prev.pic, maxPic),
                    status: Math.max(prev.status, maxStatus)
                }));
            };

            useEffect(() => {
                const dbRef = db.ref('projects/main/items');
                const unsubscribe = dbRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        let data = snapshot.val();
                        if (typeof data === 'object' && !Array.isArray(data)) data = Object.values(data);
                        const validData = Array.isArray(data) ? data.filter(Boolean).map(item => ({
                            ...item,
                            parentId: item.parentId || null,
                            predecessors: item.predecessors || [],
                            progressUpdates: Array.isArray(item.progressUpdates) ? item.progressUpdates : [],
                            milestoneConfig: {
                                type: item.milestoneConfig?.type || 'star',
                                items: item.milestoneConfig?.items || []
                            }
                        })) : [];
                        setItems(validData);
                        autoSizeColumns(validData);
                    } else {
                        setItems([]);
                    }
                    setIsLoaded(true);
                }, (error) => {
                    setDbError(error.message);
                    setIsLoaded(true);
                });
                
                const holidayRef = db.ref('projects/main/holidays');
                const unsubHoliday = holidayRef.on('value', snap => {
                    if (snap.exists()) setCustomHolidays(Object.values(snap.val()));
                    else setCustomHolidays([]);
                });

                return () => {
                    dbRef.off('value', unsubscribe);
                    holidayRef.off('value', unsubHoliday);
                };
            }, []);

            const updateState = (newItems, originTaskId = null, saveHistory = true) => {
                let cascadedItems = newItems;
                if (originTaskId) cascadedItems = cascadeDependencies(newItems, originTaskId);
                const finalItems = recalculateTree(cascadedItems);
                if (saveHistory) {
                    const stateToSave = dragStartStateRef.current || items;
                    setHistory(prev => [...prev.slice(-10), stateToSave]);
                    dragStartStateRef.current = null; 
                }
                setItems(finalItems);
                db.ref('projects/main/items').set(finalItems);
            };

            const handleUpdateField = (id, field, value) => {
                if (id === null && field === 'FILTER_PIC') { setPicFilter([value]); return; }
                if (id === null && field === 'FILTER_STATUS') { setStatusFilter([value]); return; }
                const newItems = items.map(item => item.id === id ? { ...item, [field]: (field === 'progress' ? Number(value) : value) } : item);
                updateState(newItems, (field === 'startDate' || field === 'endDate') ? id : null, true);
            };

            const handleAddProgressUpdate = (jobId, text) => {
                const trimmedText = text.trim();
                if (!trimmedText) return;
                const now = new Date();
                const timeStr = now.toLocaleString('en-GB', {
                    day: '2-digit',
                    month: 'short',
                    year: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const newItems = items.map(item => item.id === jobId ? {
                    ...item,
                    progressUpdates: [{ text: trimmedText, time: timeStr }, ...(item.progressUpdates || [])]
                } : item);
                updateState(newItems, null, true);
            };

            const handleDeleteProgressUpdate = (jobId, indexToDelete) => {
                const newItems = items.map(item => item.id === jobId ? {
                    ...item,
                    progressUpdates: (item.progressUpdates || []).filter((_, index) => index !== indexToDelete)
                } : item);
                updateState(newItems, null, true);
            };

            const handleUpdateTaskProgress = (taskId, value) => {
                let progress = Number(value);
                if (Number.isNaN(progress)) progress = 0;
                progress = Math.max(0, Math.min(100, progress));
                const newItems = items.map(item => item.id === taskId ? { ...item, progress } : item);
                updateState(newItems, null, true);
            };

            const handleAddChild = (targetId, newType, relation = 'child') => {
                const target = items.find(i => i.id === targetId);
                let parentId = relation === 'child' ? target.id : target.parentId;
                
                let newSortOrder;
                if (newType === 'Milestone' && target.type === 'Project' && relation === 'child') {
                    const projectChildren = items.filter(i => i.parentId === target.id).sort((a,b) => a.sortOrder - b.sortOrder);
                    const projectMilestones = projectChildren.filter(i => i.type === 'Milestone');
                    
                    if (projectMilestones.length > 0) {
                        newSortOrder = projectMilestones[projectMilestones.length - 1].sortOrder + 0.001;
                    } else if (projectChildren.length > 0) {
                        newSortOrder = projectChildren[0].sortOrder - 0.001;
                    } else {
                        newSortOrder = target.sortOrder + 0.001;
                    }
                } else if (relation === 'sibling') {
                    newSortOrder = target.sortOrder + 0.001;
                } else {
                    newSortOrder = Math.max(0, ...items.map(i => i.sortOrder)) + 1;
                }

                const newItem = {
                    id: generateId(), parentId, type: newType, taskName: `New ${newType}`, 
                    pic: target.pic || '', startDate: target.startDate || getTodayStr(), endDate: target.endDate || addDays(getTodayStr(), 2), 
                    progress: 0, status: 'Not Started', remark: '', sortOrder: newSortOrder, predecessors: [],
                    milestoneConfig: { type: 'star', items: [] }
                };
                
                let updatedItems = [...items, newItem].map(i => ({...i}));
                updatedItems.sort((a,b) => a.sortOrder - b.sortOrder).forEach((item, index) => {
                    item.sortOrder = index + 1;
                });

                updateState(updatedItems, null, true);
            };

            const handleAddNewRoot = (e) => {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                const newItem = {
                    id: generateId(), parentId: null, type: 'Project', taskName: 'New Project', 
                    pic: '', startDate: getTodayStr(), endDate: addDays(getTodayStr(), 7), 
                    progress: 0, status: 'Not Started', remark: '', sortOrder: items.length + 1, predecessors: [],
                    milestoneConfig: { type: 'star', items: [] }
                };
                if (!selectedProjects.includes('All')) {
                    setSelectedProjects(prev => [...prev, newItem.id]);
                }
                updateState([...items, newItem], null, true);
            };

            const handleUndo = () => {
                if (history.length > 0) {
                    const previousState = history[history.length - 1];
                    setItems(previousState);
                    setHistory(prev => prev.slice(0, -1));
                    db.ref('projects/main/items').set(previousState);
                }
            };

            const handleProjectToggle = (projectId) => {
                if (projectId === 'All') { setSelectedProjects(['All']); }
                else {
                    let newSelected = selectedProjects.filter(id => id !== 'All');
                    if (newSelected.includes(projectId)) {
                        newSelected = newSelected.filter(id => id !== projectId);
                        if (newSelected.length === 0) newSelected = ['All'];
                    } else { newSelected.push(projectId); }
                    setSelectedProjects(newSelected);
                }
            };

            const handleChecklistToggle = (value, selectedValues, setSelectedValues) => {
                if (value === 'All') {
                    setSelectedValues(['All']);
                    return;
                }

                let newSelected = selectedValues.filter(v => v !== 'All');
                if (newSelected.includes(value)) {
                    newSelected = newSelected.filter(v => v !== value);
                    if (newSelected.length === 0) newSelected = ['All'];
                } else {
                    newSelected.push(value);
                }
                setSelectedValues(newSelected);
            };
            
            const handleSaveHoliday = () => {
                if (!newHoliday.label.trim()) return;
                const newHolidays = [...customHolidays, { id: generateId(), date: newHoliday.date, label: newHoliday.label, type: newHoliday.type || 'holiday' }];
                setCustomHolidays(newHolidays);
                db.ref('projects/main/holidays').set(newHolidays);
                setNewHoliday({ date: getTodayStr(), label: '', type: 'holiday' });
            };

            const handleDeleteHoliday = (id) => {
                const newHolidays = customHolidays.filter(h => h.id !== id);
                setCustomHolidays(newHolidays);
                db.ref('projects/main/holidays').set(newHolidays);
            };

            const handleImportClick = () => fileInputRef.current.click();
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const lines = evt.result.split('\n');
                    if (lines.length < 2) return;
                    const parsed = [];
                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        const row = parseCSVLine(lines[i]);
                        
                        let priorityVal = '';
                        let remarkIdx = 9;
                        let sortOrderIdx = 10;
                        let predsIdx = 11;
                        let progressUpdatesIdx = -1;

                        if (row.length >= 13) {
                            priorityVal = row[9].replace(/^"|"$/g, '');
                            remarkIdx = 10;
                            sortOrderIdx = 11;
                            predsIdx = 12;
                        }
                        if (row.length >= 14) {
                            progressUpdatesIdx = 13;
                        }

                        if(row.length >= 11) {
                            const predsRaw = row[predsIdx] ? row[predsIdx].replace(/^"|"$/g, '') : "";
                            const predecessors = predsRaw ? predsRaw.split(';') : [];
                            let progressUpdates = [];
                            if (progressUpdatesIdx !== -1 && row[progressUpdatesIdx]) {
                                try {
                                    const parsedUpdates = JSON.parse(row[progressUpdatesIdx].replace(/^"|"$/g, ''));
                                    progressUpdates = Array.isArray(parsedUpdates) ? parsedUpdates : [];
                                } catch (err) {
                                    progressUpdates = [];
                                }
                            }
                            parsed.push({
                                id: row[0], parentId: row[1] || null, type: row[2], taskName: row[3].replace(/^"|"$/g, ''),
                                pic: row[4].replace(/^"|"$/g, ''), status: row[5], progress: Number(row[6]),
                                startDate: row[7], endDate: row[8], priority: priorityVal, remark: row[remarkIdx].replace(/^"|"$/g, ''), 
                                sortOrder: Number(row[sortOrderIdx]), predecessors, progressUpdates,
                                milestoneConfig: { type: 'star', items: [] }
                            });
                        }
                    }
                    updateState(parsed, null, true);
                    e.target.value = null; 
                };
                reader.readAsText(file);
            };

            if (!isLoaded) return <div className="p-10 text-center h-screen flex items-center justify-center"><span className="animate-pulse text-blue-600 font-bold">Connecting...</span></div>;

            return (
                <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
                    {/* Holiday Modal */}
                    {isHolidayModalOpen && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl border border-slate-200 w-[400px] flex flex-col max-h-[80vh] overflow-hidden">
                                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icons.Calendar /> Calendar Settings</h3>
                                    <button onClick={() => setIsHolidayModalOpen(false)} className="text-slate-400 hover:text-slate-600"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="p-5 flex-1 overflow-y-auto">
                                    {customHolidays.length === 0 ? (
                                        <p className="text-slate-500 text-sm text-center py-4 italic">No custom dates added yet.</p>
                                    ) : (
                                        <ul className="space-y-2 mb-6">
                                            {customHolidays.sort((a,b) => parseDate(a.date) - parseDate(b.date)).map(h => (
                                                <li key={h.id} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200">
                                                    <div>
                                                        <div className="font-semibold text-sm text-slate-700 flex items-center gap-1.5">
                                                            {(!h.type || h.type === 'holiday') ? <span className="text-rose-500 text-[10px]">●</span> : <span className="text-emerald-500 text-[10px]">●</span>}
                                                            {h.label}
                                                        </div>
                                                        <div className="text-xs text-slate-500 ml-3">{shortDate(h.date)}</div>
                                                    </div>
                                                    {isEditMode && (
                                                        <button onClick={() => handleDeleteHoliday(h.id)} className="text-rose-500 hover:text-rose-700 p-1 bg-white rounded shadow-sm border border-slate-200 transition-colors"><Icons.Delete /></button>
                                                    )}
                                                </li>
                                            ))}
                                        </ul>
                                    )}

                                    {isEditMode ? (
                                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Add Special Date</h4>
                                            <div className="space-y-3">
                                                <div>
                                                    <label className="block text-xs font-medium text-slate-600 mb-1.5">Date Type</label>
                                                    <div className="flex gap-4">
                                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                                            <input type="radio" name="hType" checked={(!newHoliday.type || newHoliday.type === 'holiday')} onChange={() => setNewHoliday({...newHoliday, type: 'holiday'})} className="accent-rose-500" />
                                                            <span className="text-xs font-medium text-rose-600">Holiday (Day Off)</span>
                                                        </label>
                                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                                            <input type="radio" name="hType" checked={newHoliday.type === 'working_day'} onChange={() => setNewHoliday({...newHoliday, type: 'working_day'})} className="accent-emerald-500" />
                                                            <span className="text-xs font-medium text-emerald-600">Working Day</span>
                                                        </label>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-medium text-slate-600 mb-1">Date</label>
                                                    <input type="date" value={newHoliday.date.replace(/\./g, '-')} onChange={e => setNewHoliday({...newHoliday, date: e.target.value.replace(/-/g, '.')})} className="w-full border border-slate-300 rounded px-3 py-1.5 text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-medium text-slate-600 mb-1">Description</label>
                                                    <input type="text" value={newHoliday.label} onChange={e => setNewHoliday({...newHoliday, label: e.target.value})} placeholder="e.g. Songkran Festival or Sat Working Day" className="w-full border border-slate-300 rounded px-3 py-1.5 text-sm outline-none focus:border-blue-500" />
                                                </div>
                                                <button onClick={handleSaveHoliday} disabled={!newHoliday.label.trim()} className="w-full py-2 bg-blue-600 text-white text-sm font-medium rounded shadow-sm hover:bg-blue-700 disabled:opacity-50 transition-colors">Add Date</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center p-3 bg-slate-50 text-slate-500 text-xs rounded border border-slate-200">
                                            Turn on <strong>Edit Mode</strong> to manage calendar.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {dbError ? (
                        <div className="bg-rose-100 text-rose-800 px-4 py-0.5 text-xs flex justify-center items-center gap-2 border-b border-rose-200">
                            <Icons.Warning /><span><strong>Error:</strong> {dbError}</span>
                        </div>
                    ) : (
                        <div className="bg-emerald-100 text-emerald-800 px-4 py-0.5 text-xs flex justify-center items-center gap-2 border-b border-emerald-200">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            <span><strong>Live Connected</strong></span>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 shadow-sm px-6 py-3 flex items-center justify-between z-[70] relative">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Mitsubishi_logo.svg/1920px-Mitsubishi_logo.svg.png" className="h-6 w-auto object-contain" alt="Logo" />
                                <h1 className="text-lg font-black whitespace-nowrap bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 tracking-tight">PE-Body Project</h1>
                            </div>
                            <nav className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setView('dashboard')} className={`px-4 py-1.5 text-sm font-medium rounded-md flex items-center gap-2 transition-colors ${view === 'dashboard' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}><Icons.Dashboard /> Dashboard</button>
                                <button onClick={() => setView('gantt')} className={`px-4 py-1.5 text-sm font-medium rounded-md flex items-center gap-2 transition-colors ${view === 'gantt' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}><Icons.Gantt /> Schedule</button>
                                <button onClick={() => setView('progress')} className={`px-4 py-1.5 text-sm font-medium rounded-md flex items-center gap-2 transition-colors ${view === 'progress' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}><Icons.Progress /> Progress</button>
                                {view === 'gantt' && (
                                    <>
                                        <div className="w-px bg-slate-300 mx-2 my-1"></div>
                                        <button 
                                            onClick={() => setIsEditMode(!isEditMode)} 
                                            className="flex flex-col items-center justify-center px-2 cursor-pointer outline-none group"
                                            title={isEditMode ? "Disable Edit Mode" : "Enable Edit Mode"}
                                        >
                                            <span className={`text-[8px] whitespace-nowrap font-bold mb-1 transition-colors uppercase tracking-wider ${isEditMode ? 'text-[#529e96]' : 'text-slate-400'}`}>
                                                {isEditMode ? 'Edit Mode' : 'View Only'}
                                            </span>
                                            <div className={`relative inline-flex h-5 w-10 items-center rounded-full transition-colors duration-300 ${isEditMode ? 'bg-[#529e96]' : 'bg-[#d4d4d4]'}`}>
                                                <span className={`inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform duration-300 ${isEditMode ? 'translate-x-[22px]' : 'translate-x-[2px]'}`} />
                                            </div>
                                        </button>
                                    </>
                                )}
                            </nav>
                        </div>

                        <div className="flex items-center gap-4">
                            {view === 'gantt' && (
                                <>
                                    <div className="flex bg-slate-100 p-0.5 rounded-md border border-slate-200/60 shadow-inner">
                                        <button onClick={() => setScale('day')} className={`px-2 py-0.5 text-[11px] font-bold rounded-sm transition-colors ${scale === 'day' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}`}>Day</button>
                                        <button onClick={() => setScale('week')} className={`px-2 py-0.5 text-[11px] font-bold rounded-sm transition-colors ${scale === 'week' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}`}>Week</button>
                                        <button onClick={() => setScale('month')} className={`px-2 py-0.5 text-[11px] font-bold rounded-sm transition-colors ${scale === 'month' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}`}>Month</button>
                                    </div>

                                    <div className="relative">
                                        <button onClick={() => setIsProjectFilterOpen(!isProjectFilterOpen)} className={`px-3 py-1.5 text-xs font-semibold rounded border flex items-center gap-1 ${hasActiveFilters ? 'bg-blue-50 border-blue-300 text-blue-700' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'}`}>
                                            <Icons.Filter /> Filter {activeFilterCount > 0 && <span className="bg-blue-600 text-white text-[10px] px-1.5 rounded-full">{activeFilterCount}</span>}
                                        </button>
                                        {isProjectFilterOpen && (
                                            <>
                                                <div className="fixed inset-0 z-[9998]" onClick={() => setIsProjectFilterOpen(false)}></div>
                                                <div className="absolute top-full right-0 mt-2 w-80 bg-white border border-slate-200 shadow-xl rounded-xl py-2 z-[9999]">
                                                    <div className="max-h-[70vh] overflow-y-auto px-3 py-1">
                                                        <div className="mb-2">
                                                            <div className="px-2 py-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Project</div>
                                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg font-bold text-sm">
                                                                <input type="checkbox" checked={selectedProjects.includes('All')} onChange={() => handleProjectToggle('All')} /> All Projects
                                                            </label>
                                                            <div className="ml-4 flex flex-col gap-1">
                                                                {items.filter(i => i.type === 'Project').map(p => (
                                                                    <label key={p.id} className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors text-sm">
                                                                        <input type="checkbox" checked={selectedProjects.includes(p.id)} onChange={() => handleProjectToggle(p.id)} /> {p.taskName}
                                                                    </label>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        <div className="h-px bg-slate-100 my-2"></div>

                                                        <div className="mb-2">
                                                            <div className="px-2 py-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">PIC</div>
                                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg font-bold text-sm">
                                                                <input type="checkbox" checked={picFilter.includes('All')} onChange={() => handleChecklistToggle('All', picFilter, setPicFilter)} /> All PIC
                                                            </label>
                                                            <div className="ml-4 flex flex-col gap-1">
                                                                {allPics.map(pic => (
                                                                    <label key={pic} className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors text-sm">
                                                                        <input type="checkbox" checked={picFilter.includes(pic)} onChange={() => handleChecklistToggle(pic, picFilter, setPicFilter)} /> {pic}
                                                                    </label>
                                                                ))}
                                                                {allPics.length === 0 && <div className="px-2 py-1.5 text-slate-400 italic text-xs">No PICs found</div>}
                                                            </div>
                                                        </div>

                                                        <div className="h-px bg-slate-100 my-2"></div>

                                                        <div>
                                                            <div className="px-2 py-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Status</div>
                                                            <label className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg font-bold text-sm">
                                                                <input type="checkbox" checked={statusFilter.includes('All')} onChange={() => handleChecklistToggle('All', statusFilter, setStatusFilter)} /> All Status
                                                            </label>
                                                            <div className="ml-4 flex flex-col gap-1">
                                                                {allStatuses.map(st => (
                                                                    <label key={st} className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors text-sm">
                                                                        <input type="checkbox" checked={statusFilter.includes(st)} onChange={() => handleChecklistToggle(st, statusFilter, setStatusFilter)} /> {st}
                                                                    </label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    {isEditMode && (
                                        <button onClick={() => setIsHolidayModalOpen(true)} className="px-3 py-1.5 text-xs font-semibold rounded border flex items-center gap-1 bg-white border-slate-300 text-slate-700 hover:bg-slate-50 transition-colors">
                                            <Icons.Calendar /> Calendar Settings
                                        </button>
                                    )}

                                    {isEditMode && (
                                        <button onClick={handleUndo} disabled={history.length === 0} className="p-2 text-slate-500 hover:text-slate-800 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Undo last action">
                                            <Icons.Undo />
                                        </button>
                                    )}

                                    <div className="flex gap-2">
                                        {isEditMode && (
                                            <>
                                                <button onClick={handleImportClick} className="px-2 py-1 text-[11px] font-semibold whitespace-nowrap bg-slate-100 text-slate-700 hover:bg-slate-200 rounded border border-slate-300 flex items-center gap-1 transition-colors">
                                                    <Icons.Upload /> Import CSV
                                                </button>
                                                <input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".csv" className="hidden" />
                                            </>
                                        )}
                                        
                                        <button onClick={() => exportToCSV(displayedItems)} className="px-2 py-1 text-[11px] font-semibold whitespace-nowrap bg-slate-100 text-slate-700 hover:bg-slate-200 rounded border border-slate-300 flex items-center gap-1 transition-colors">
                                            <Icons.Download /> CSV
                                        </button>

                                        <div className="relative">
                                            <button onClick={() => setIsExportMenuOpen(!isExportMenuOpen)} className="px-2 py-1 text-[11px] font-semibold whitespace-nowrap bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded border border-emerald-300 flex items-center gap-1 transition-colors">
                                                <Icons.Excel /> Excel <svg className={`w-3 h-3 transition-transform ${isExportMenuOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"></path></svg>
                                            </button>
                                            {isExportMenuOpen && (
                                                <>
                                                    <div className="fixed inset-0 z-[9998]" onClick={() => setIsExportMenuOpen(false)}></div>
                                                    <div className="absolute top-full right-0 mt-2 w-48 bg-white border border-slate-200 shadow-xl rounded-xl py-1 z-[9999] overflow-hidden">
                                                        <div className="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 mb-1">Export Options</div>
                                                        <button className="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2" onClick={() => { exportToExcel(items, customHolidays); setIsExportMenuOpen(false); }}><div className="w-1.5 h-1.5 rounded-full bg-blue-500"></div> All Projects</button>
                                                        <button className="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2" onClick={() => { exportToExcel(getOnlyShowedItems(), customHolidays); setIsExportMenuOpen(false); }}><div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> Only Showed</button>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {view === 'dashboard' ? (
                            <Dashboard items={displayedItems} />
                        ) : view === 'progress' ? (
                            <ProgressPage
                                items={displayedItems}
                                onAddProgressUpdate={handleAddProgressUpdate}
                                onDeleteProgressUpdate={handleDeleteProgressUpdate}
                                onUpdateTaskProgress={handleUpdateTaskProgress}
                            />
                        ) : (
                            <GanttChart 
                                isEditMode={isEditMode}
                                items={displayedItems} scale={scale} onUpdateField={handleUpdateField} onAddChild={handleAddChild}
                                customHolidays={customHolidays}
                                onDelete={(id) => {
                                    const getIdsToDelete = (parentId) => {
                                        let ids = [parentId];
                                        items.filter(i => i.parentId === parentId).forEach(child => {
                                            ids = ids.concat(getIdsToDelete(child.id));
                                        });
                                        return ids;
                                    };
                                    const idsToDelete = getIdsToDelete(id);
                                    const newItems = items.filter(i => !idsToDelete.includes(i.id)).map(i => ({
                                        ...i, predecessors: (i.predecessors || []).filter(pId => !idsToDelete.includes(pId))
                                    }));
                                    updateState(newItems, null, true);
                                }}
                                updateDates={(id, s, e) => {
                                    const newItems = items.map(i => i.id === id ? { ...i, startDate: s, endDate: e } : i);
                                    updateState(newItems, id, true);
                                }}
                                previewDates={(id, s, e) => {
                                    const newItems = items.map(i => i.id === id ? { ...i, startDate: s, endDate: e } : i);
                                    updateState(newItems, id, false);
                                }} 
                                collapsedIds={collapsedIds} toggleCollapse={(id) => setCollapsedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id])}
                                colWidths={colWidths} setColWidths={setColWidths} 
                                handleAddDependency={(s, t) => {
                                    const targetTask = items.find(i => i.id === t);
                                    const currentPreds = targetTask.predecessors || [];
                                    if (currentPreds.includes(s)) return;
                                    const newItems = items.map(i => i.id === t ? { ...i, predecessors: [...currentPreds, s] } : i);
                                    updateState(newItems, s, true);
                                }} 
                                handleRemoveDependencies={(t, specific) => {
                                    const newItems = items.map(i => {
                                        if (specific) {
                                            if (i.id === t) return { ...i, predecessors: (i.predecessors || []).filter(p => p !== specific) };
                                            return i;
                                        } else {
                                            let newP = i.predecessors || [];
                                            if (i.id === t) newP = [];
                                            else newP = newP.filter(p => p !== t);
                                            return { ...i, predecessors: newP };
                                        }
                                    });
                                    updateState(newItems, null, true);
                                }}
                                frozenColumn={frozenColumn} setFrozenColumn={setFrozenColumn} picFilter={picFilter} statusFilter={statusFilter}
                                handleAddNewRoot={handleAddNewRoot}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
