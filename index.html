    <script type="text/babel">
        const firebaseConfig = {

            measurementId: "G-1S1EVTSVJY",

        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const { useState, useEffect, useRef, useMemo } = React;

        const parseDate = (dateStr) => {
            if (!dateStr) return new Date();
            const [y, m, d] = dateStr.split('.');
            return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
        };

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        };

        const getTodayStr = () => formatDate(new Date());

        const addDays = (dateStr, days) => {
            const d = parseDate(dateStr);
            d.setDate(d.getDate() + days);
            return formatDate(d);
        };

        const diffDays = (startStr, endStr) => {
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            const diffTime = Math.abs(end - start);
            return Math.round(diffTime / (1000 * 60 * 60 * 24));
        };

        const shortDate = (dateStr) => {
            if (!dateStr) return '';
            const d = parseDate(dateStr);
            const day = String(d.getDate()).padStart(2, '0');
            const month = d.toLocaleDateString('en-US', { month: 'short' });
            const year = String(d.getFullYear()).substring(2);
            return `${day} ${month} ${year}`;
        };

        const calculateStatus = (progress, startDateStr, endDateStr) => {
            if (progress >= 100) return 'Complete';
            if (!startDateStr || !endDateStr) return 'Not Started';

            const start = parseDate(startDateStr);
            const end = parseDate(endDateStr);
            const evalDate = new Date(); 
            evalDate.setHours(0, 0, 0, 0); 

            if (evalDate < start) {
                if (progress > 0) return 'In Progress';
                return 'Not Started';
            }

            const totalDurationDays = diffDays(startDateStr, endDateStr) + 1;
            const elapsedDays = diffDays(startDateStr, formatDate(evalDate)); 

            let percentPlan = 100;
            if (totalDurationDays > 0) {
                percentPlan = (elapsedDays / totalDurationDays) * 100;
                percentPlan = Math.max(0, Math.min(100, percentPlan)); 
            }

            if (progress < (percentPlan - 0.5)) return 'Delay';
            if (progress > 0) return 'In Progress';
            return 'Not Started';
        };

        const recalculateTree = (items) => {
            let newItems = JSON.parse(JSON.stringify(items));
            const getChildren = (parentId) => newItems.filter(item => item.parentId === parentId);

            const calcNode = (node) => {
                const children = getChildren(node.id);
                children.forEach(child => calcNode(child));

                if (children.length === 0 || node.type === 'Milestone') {
                    if (node.type !== 'Milestone') {
                        node.status = calculateStatus(node.progress, node.startDate, node.endDate);
                    }
                    return node;
                }
                
                let totalProgressWeight = 0;
                let totalDuration = 0;
                let minStart = null;
                let maxEnd = null;
                let validChildrenCount = 0;
                
                let hasDelay = false;
                let hasInProgress = false;
                let allComplete = true;

                children.forEach(child => {
                    if (child.type !== 'Milestone') {
                        const startD = parseDate(child.startDate);
                        const endD = parseDate(child.endDate);
                        if (!minStart || startD < minStart) minStart = startD;
                        if (!maxEnd || endD > maxEnd) maxEnd = endD;
                        
                        const duration = diffDays(child.startDate, child.endDate) + 1;
                        totalProgressWeight += (child.progress * duration);
                        totalDuration += duration;
                        
                        if (child.status === 'Delay') hasDelay = true;
                        if (child.status === 'In Progress') hasInProgress = true;
                        if (child.status !== 'Complete') allComplete = false;
                        
                        validChildrenCount++;
                    }
                });

                if (validChildrenCount > 0) {
                    if (totalDuration > 0) {
                        node.progress = totalProgressWeight / totalDuration;
                    } else {
                        node.progress = totalProgressWeight / validChildrenCount;
                    }
                    if (minStart) node.startDate = formatDate(minStart);
                    if (maxEnd) node.endDate = formatDate(maxEnd);
                    
                    if (hasDelay) {
                        node.status = 'Delay';
                    } else if (allComplete) {
                        node.status = 'Complete';
                    } else if (hasInProgress || node.progress > 0) {
                        node.status = 'In Progress';
                    } else {
                        node.status = 'Not Started';
                    }
                } else {
                    node.status = calculateStatus(node.progress, node.startDate, node.endDate);
                }
                return node;
            };

            const rootNodes = newItems.filter(item => !item.parentId);
            rootNodes.forEach(root => calcNode(root));
            return newItems;
        };

        const cascadeDependencies = (items, startNodeId) => {
            let currentItems = JSON.parse(JSON.stringify(items));
            let loopGuard = 0;
            let changed = true;

            const getDescendantIds = (parentId) => {
                const directChildren = currentItems.filter(item => item.parentId === parentId);
                return directChildren.flatMap(child => [child.id, ...getDescendantIds(child.id)]);
            };

            const shiftItemDates = (task, days) => {
                if (task.startDate) task.startDate = addDays(task.startDate, days);
                if (task.endDate) task.endDate = addDays(task.endDate, days);

                if (task.milestoneConfig?.items?.length) {
                    task.milestoneConfig.items = task.milestoneConfig.items.map(milestone => ({
                        ...milestone,
                        date: milestone.date ? addDays(milestone.date, days) : milestone.date,
                        startDate: milestone.startDate ? addDays(milestone.startDate, days) : milestone.startDate,
                        endDate: milestone.endDate ? addDays(milestone.endDate, days) : milestone.endDate
                    }));
                }
            };

            currentItems = recalculateTree(currentItems);

            while (changed && loopGuard < 100) {
                changed = false;
                loopGuard++;

                for (let i = 0; i < currentItems.length; i++) {
                    const task = currentItems[i];
                    if (!task.predecessors || task.predecessors.length === 0) continue;

                    const isParent = currentItems.some(c => c.parentId === task.id && c.type !== 'Milestone');

                    let maxEndDateStr = null;
                    task.predecessors.forEach(predId => {
                        const pred = currentItems.find(p => p.id === predId);
                        if (pred && pred.endDate && (!maxEndDateStr || pred.endDate > maxEndDateStr)) {
                            maxEndDateStr = pred.endDate;
                        }
                    });

                    if (maxEndDateStr) {
                        const expectedStartD = parseDate(maxEndDateStr);
                        expectedStartD.setDate(expectedStartD.getDate() + 1); 
                        const expectedStartStr = formatDate(expectedStartD);

                        if (task.startDate && task.startDate < expectedStartStr) {
                            const diffDaysSigned = diffDays(task.startDate, expectedStartStr);
                            if (isParent) {
                                const descendantIds = getDescendantIds(task.id);
                                currentItems.forEach(item => {
                                    if (descendantIds.includes(item.id)) shiftItemDates(item, diffDaysSigned);
                                });
                            } else {
                                shiftItemDates(task, diffDaysSigned);
                            }
                            changed = true;
                        }
                    }
                }
                if (changed) {
                    currentItems = recalculateTree(currentItems);
                }
            }
            return currentItems;
        };

        const Icons = {
            Project: () => <svg className="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>,
            Job: () => <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>,

            'Sub-task': () => <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Milestone: () => <svg className="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>,
            Add: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>,
            Delete: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,

            Undo: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>,
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"></path></svg>,
            Gantt: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>,

            Excel: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,

        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const ALL_COLUMNS = [
            { id: 'taskName', label: 'Task Name' },
            { id: 'pic', label: 'PIC' },
            { id: 'status', label: 'Status', center: true },
            { id: 'progress', label: '%', center: true },
            { id: 'startDate', label: 'Start' },
            { id: 'endDate', label: 'End' },
            { id: 'priority', label: 'Priority', center: true },
            { id: 'remark', label: 'Remark' },
            { id: 'act', label: 'Act', center: true }
        ];

        const Dashboard = ({ items }) => {
            const [healthScale, setHealthScale] = useState('week');
            const tasks = items.filter(i => i.type !== 'Project' && i.type !== 'Milestone');
            const delayedTasks = tasks.filter(t => t.status === 'Delay');
            const completeTasks = tasks.filter(t => t.status === 'Complete');
            
            const totalProgress = items.filter(i => i.type === 'Project').reduce((acc, curr, _, arr) => acc + (curr.progress / arr.length), 0);
            const healthTasks = tasks.filter(t => t.startDate && t.endDate);
            const healthData = (() => {
                if (healthTasks.length === 0) return [];

                const minStart = new Date(Math.min(...healthTasks.map(t => parseDate(t.startDate))));
                const maxEnd = new Date(Math.max(...healthTasks.map(t => parseDate(t.endDate))));
                const cursor = new Date(minStart);
                if (healthScale === 'week') {
                    cursor.setDate(cursor.getDate() - ((cursor.getDay() + 6) % 7));
                } else {
                    cursor.setDate(1);
                }

                const data = [];
                let guard = 0;
                while (cursor <= maxEnd && guard < 24) {
                    const periodStart = new Date(cursor);
                    const periodEnd = new Date(cursor);
                    if (healthScale === 'week') {
                        periodEnd.setDate(periodEnd.getDate() + 6);
                    } else {
                        periodEnd.setMonth(periodEnd.getMonth() + 1, 0);
                    }

                    const label = healthScale === 'week'
                        ? `Week ${data.length + 1}`
                        : periodStart.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    const activeTasks = healthTasks.filter(t => parseDate(t.startDate) <= periodEnd && parseDate(t.endDate) >= periodStart);
                    const totalInPeriod = activeTasks.length;
                    const onTrackInPeriod = activeTasks.filter(t => t.status !== 'Delay').length;

                    data.push({ label, totalInPeriod, onTrackInPeriod });

                    if (healthScale === 'week') cursor.setDate(cursor.getDate() + 7);
                    else cursor.setMonth(cursor.getMonth() + 1, 1);
                    guard++;
                }
                return data;
            })();
            const chart = {
                width: 900,
                height: 280,
                left: 54,
                right: 24,
                top: 18,
                bottom: 42
            };
            chart.innerWidth = chart.width - chart.left - chart.right;
            chart.innerHeight = chart.height - chart.top - chart.bottom;
            const maxHealthValue = Math.max(1, ...healthData.flatMap(d => [d.totalInPeriod, d.onTrackInPeriod]));
            const yMax = Math.ceil(maxHealthValue / 5) * 5 || 5;
            const getHealthX = (index) => chart.left + (healthData.length <= 1 ? 0 : (index / (healthData.length - 1)) * chart.innerWidth);
            const getHealthY = (value) => chart.top + chart.innerHeight - (value / yMax) * chart.innerHeight;
            const onTrackPath = healthData.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getHealthX(i)} ${getHealthY(d.onTrackInPeriod)}`).join(' ');
            const totalPath = healthData.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getHealthX(i)} ${getHealthY(d.totalInPeriod)}`).join(' ');
            const onTrackAreaPath = healthData.length > 0
                ? `${onTrackPath} L ${getHealthX(healthData.length - 1)} ${chart.top + chart.innerHeight} L ${getHealthX(0)} ${chart.top + chart.innerHeight} Z`
                : '';
            const yTicks = Array.from({ length: 5 }, (_, i) => Math.round((yMax / 4) * i)).reverse();

            return (
                <div className="p-6 overflow-y-auto h-full bg-slate-50">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Dashboard Overview</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Overall Progress</span>
                            <span className="text-4xl font-bold text-blue-600">{Math.round(totalProgress || 0)}%</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Total Tasks</span>
                            <span className="text-4xl font-bold text-slate-700">{tasks.length}</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Delayed Tasks</span>
                            <span className="text-4xl font-bold text-rose-500">{delayedTasks.length}</span>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                            <span className="text-slate-500 text-sm font-medium mb-1">Completed</span>
                            <span className="text-4xl font-bold text-emerald-500">{completeTasks.length}</span>
                        </div>
                    </div>

        const statusConfig = {
            'Complete':    { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200', dot: 'bg-emerald-500', ring: 'ring-emerald-500/20' },

        const ProgressTaskRow = ({ task, tone }) => {

        const JobCard = ({ job, tasks, onAddProgressUpdate, onDeleteProgressUpdate, onUpdateTaskProgress }) => {
            const defaultDraft = job.status === 'Delay'

            const [updateText, setUpdateText] = useState(defaultDraft);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const updates = job.progressUpdates || [];

            const completeTasks = tasks.filter(t => t.status === 'Complete');
            const inProgressTasks = tasks.filter(t => t.status === 'In Progress');
            const delayTasks = tasks.filter(t => t.status === 'Delay');

            const sc = statusConfig[job.status] || statusConfig['Not Started'];
            const progressPercent = Math.round(job.progress || 0);
            const progressBarColor = job.status === 'Complete' ? 'bg-emerald-500'
                : job.status === 'Delay' ? 'bg-rose-500'
                : 'bg-blue-500';

            const handleSubmitUpdate = () => {
                if (!updateText.trim()) return;
                onAddProgressUpdate(job.id, updateText.trim());
                setUpdateText(defaultDraft);
                setIsModalOpen(false);
            };

            const handleCancel = () => {

            return (
                <div className={`bg-white rounded-lg border ${sc.border} shadow-sm hover:shadow-md transition-shadow duration-200 overflow-hidden`}>
                    <div className="px-3 py-2 flex items-center justify-between gap-3 border-b border-slate-100">

                    <div className="px-3 py-2">

                                    <button onClick={handleCancel} className="text-slate-400 hover:text-slate-600 transition-colors p-1.5 rounded-lg hover:bg-slate-100">

                                    </button>

                                <div className="flex flex-col md:flex-row flex-1 overflow-hidden min-h-[400px]">

                                            <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Previous Updates</span>
                                        </div>
                                        <div className="p-5 flex-1 overflow-y-auto">

                                                                <Icons.Delete />

                                                        </div>

                                            ) : (

                                                    <svg className="w-10 h-10 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

                                                autoFocus
                                                value={updateText}
                                                onChange={e => setUpdateText(e.target.value)}
                                                onKeyDown={e => { if (e.key === 'Enter' && e.metaKey) handleSubmitUpdate(); }}
                                                placeholder="Type your new update here... (Cmd+Enter to post)"
                                                className="w-full flex-1 text-sm px-4 py-3.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all placeholder:text-slate-400 shadow-sm resize-none leading-relaxed"
                                            />

                                            <button onClick={handleSubmitUpdate} className="px-6 py-2.5 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 active:scale-95 shadow-sm transition-all flex items-center gap-2">
                                                <svg className="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                                Post Update
                                            </button>
                                        </div>
                                    </div>
                                </div>

                    )}
                </div>
            );
        };

        const ProgressPage = ({ items, onAddProgressUpdate, onDeleteProgressUpdate, onUpdateTaskProgress }) => {
            const jobs = items.filter(i => i.type === 'Job');
            const projects = items.filter(i => i.type === 'Project');
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [activeView, setActiveView] = useState('update');
            const [filters, setFilters] = useState({ projects: [], pics: [], statuses: [] });
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [selectedModalJob, setSelectedModalJob] = useState(null);
            const [overviewUpdateText, setOverviewUpdateText] = useState('');

            useEffect(() => {
                if (selectedModalJob) {
                    setOverviewUpdateText(selectedModalJob.status === 'Delay' ? 'Now situation: \nDelay cause: \nHow to recover: ' : 'Now situation: ');
                }
            }, [selectedModalJob]);

            const getDescendants = (parentId) => {
                const directChildren = items.filter(i => i.parentId === parentId);
                return directChildren.flatMap(child => [child, ...getDescendants(child.id)]);
            };
            const getPlannedProgress = (task) => {
                if (!task.startDate || !task.endDate) return Math.round(task.progress || 0);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const start = parseDate(task.startDate);
                const end = parseDate(task.endDate);
                if (today < start) return 0;
                if (today > end) return 100;
                const totalDays = diffDays(task.startDate, task.endDate) + 1;
                const elapsedDays = diffDays(task.startDate, formatDate(today)) + 1;
                return Math.max(0, Math.min(100, Math.round((elapsedDays / totalDays) * 100)));
            };
            const getChildTasks = (jobId) => getDescendants(jobId)
                .filter(i => i.type === 'Task' || i.type === 'Sub-task')
                .map(task => ({ ...task, plannedProgress: getPlannedProgress(task) }));
            const getProjectJobs = (projectId) => jobs.filter(j => j.parentId === projectId);
            const availableProjects = projects.map(p => ({ id: p.id, name: p.taskName }));
            const availablePICs = [...new Set(jobs.filter(j => j.pic).map(j => j.pic))].sort();
            const availableStatuses = ['Complete', 'In Progress', 'Delay', 'Not Started'];
            const activeFilterCount = filters.projects.length + filters.pics.length + filters.statuses.length;

            const toggleFilter = (category, value) => {
                setFilters(prev => {
                    const current = prev[category];
                    if (current.includes(value)) return { ...prev, [category]: current.filter(v => v !== value) };
                    return { ...prev, [category]: [...current, value] };
                });
            };
            const clearFilters = () => setFilters({ projects: [], pics: [], statuses: [] });

            const filteredProjects = projects.filter(project => filters.projects.length === 0 || filters.projects.includes(project.id));
            const filterJob = (job) => {
                if (filters.pics.length > 0 && !filters.pics.includes(job.pic)) return false;
                if (filters.statuses.length > 0 && !filters.statuses.includes(job.status)) return false;
                return true;
            };
            let overviewJobs = filteredProjects.flatMap(project => getProjectJobs(project.id).filter(filterJob).map(job => ({ ...job, projectName: project.taskName })));

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            if (sortConfig.key) {
                overviewJobs.sort((a, b) => {
                    let valA = a[sortConfig.key] || '';
                    let valB = b[sortConfig.key] || '';
                    if (sortConfig.key === 'progress') {
                        valA = a.progress || 0;
                        valB = b.progress || 0;
                    }
                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            const SortIcon = ({ columnKey }) => {
                if (sortConfig.key !== columnKey) {

                    cell.alignment = { vertical: 'middle', horizontal: 'left' };
                    cell.border = { bottom: { style: 'thin', color: { argb: 'FFE2E8F0' } } };

                const excelStatusStyles = {
                    'Complete': { font: 'FF047857', bg: 'FFD1FAE5' },

                    'Delay': { font: 'FFE11D48', bg: 'FFFFE4E6' },

                    const taskGroups = getOverviewTaskGroups(job.id);
                    const latestUpdate = job.progressUpdates?.[0];

                        project: job.projectName,
                        jobName: job.taskName,
                        pic: job.pic || '-',
                        status: job.status || 'Not Started',
                        progress: (job.progress || 0) / 100,
                        inProgressTasks: taskGroups.inProgress.map(task => task.taskName).join('\n'),
                        delayTasks: taskGroups.delayed.map(task => task.taskName).join('\n'),
                        latestUpdate: latestUpdate ? `[${latestUpdate.time}] ${latestUpdate.text}` : ''

                    row.getCell(4).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: statusStyle.bg } };

                    row.getCell(5).font = { name: 'Segoe UI', size: 10, color: { argb: 'FF334155' } };
                    row.getCell(6).font = { name: 'Segoe UI', size: 10, color: { argb: 'FF2563EB' } };
                    row.getCell(7).font = { name: 'Segoe UI', size: 10, color: { argb: 'FFE11D48' } };
                    row.getCell(8).font = { name: 'Segoe UI', size: 10, italic: !latestUpdate, color: { argb: latestUpdate ? 'FF475569' : 'FFCBD5E1' } };

                worksheet.autoFilter = 'A2:H2';
                const buffer = await workbook.xlsx.writeBuffer();

                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'

                const title = `MMTh PE-Body Job Progression - Exported at: ${exportTimeText}`;

                const pdfStatusStyles = {
                    'Complete': { text: [4, 120, 87], fill: [209, 250, 229] },
                    'In Progress': { text: [37, 99, 235], fill: [219, 234, 254] },
                    'Delay': { text: [225, 29, 72], fill: [255, 228, 230] },

                        valign: 'middle',
                        overflow: 'linebreak'

                        textColor: [100, 116, 139],

                        latestUpdate: { cellWidth: 86, textColor: [71, 85, 105] }

                            data.cell.text = [''];

                                                            </label>

                                                    </div>

                                    title={localItem.remark || (isEditMode ? "Click to add note" : "")}

                                        ? (localItem.remark.length > 8 ? localItem.remark.substring(0, 8) + '...' : localItem.remark) 
                                        : <span className="text-slate-400 italic">Add note...</span>}
                                </div>

                                {isEditingRemark && (
                                    <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsEditingRemark(false)}>
                                        <div className="bg-white rounded-xl shadow-2xl border border-slate-200 w-96 p-5 flex flex-col" onClick={e => e.stopPropagation()}>
                                            <h3 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                                                <Icon /> {item.taskName} - Remark
                                            </h3>
                                            <textarea
                                                autoFocus
                                                rows={5}
                                                value={localItem.remark || ''}
                                                onChange={e => handleChange('remark', e.target.value)}
                                                className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none shadow-inner"
                                                placeholder="Type your notes here..."
                                            />
                                            <div className="flex justify-end gap-2 mt-4">
                                                <button onClick={() => {
                                                    handleChange('remark', item.remark);
                                                    setIsEditingRemark(false);
                                                }} className="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                                                <button onClick={() => { handleBlur('remark'); setIsEditingRemark(false); }} className="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors">Save Note</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    case 'act':
                        return (
                            <div className="flex justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 h-full items-center" style={{ width: `${colWidths.act}px` }}>
                                {isEditMode && !isMilestone && (
                                    <button onClick={(e) => onOpenAddMenu(e, item.id, item.type)} className="text-blue-500 hover:text-blue-700" title="Add Menu"><Icons.Add /></button>

                                {isEditMode && (
                                    <button onClick={() => onDelete(item.id)} className="text-rose-500 hover:text-rose-700" title="Delete"><Icons.Delete /></button>
                                )}
                            </div>
                        );
                    default: return null;
                }
            };

            const frozenColIndex = ALL_COLUMNS.findIndex(c => c.id === frozenColumn);
            const frozenCols = ALL_COLUMNS.slice(0, frozenColIndex + 1);
            const scrollableCols = ALL_COLUMNS.slice(frozenColIndex + 1);
            
            const currentFrozenWidth = frozenCols.reduce((sum, col) => sum + colWidths[col.id], 0);
            const scrollableLeftWidth = totalLeftWidth - currentFrozenWidth;

            return (
                <div 
                    className={`flex border-b border-slate-100 group h-7 items-center relative hover:bg-blue-50/50 ${isRowPinned ? 'bg-indigo-50 shadow-[0_2px_5px_rgba(0,0,0,0.05)]' : 'bg-transparent'}`}
                    style={rowStyle}
                >
                    <div className={`flex-none flex items-center ${bgClass} border-r border-slate-200 sticky left-0 group-hover:bg-blue-50/80 transition-colors isolate ${isEditingRemark ? 'z-30' : 'z-50'} shadow-[4px_0_12px_rgba(0,0,0,0.03)] h-full`} style={{ width: `${currentFrozenWidth}px` }}>
                        {frozenCols.map(col => <React.Fragment key={`frozen-${col.id}`}>{renderCell(col)}</React.Fragment>)}
                    </div>

                    <div className={`flex-none flex items-center ${bgClass} border-r border-slate-200 group-hover:bg-blue-50/80 transition-colors isolate ${isEditingRemark ? 'z-[100]' : 'z-40'} h-full`} style={{ width: `${scrollableLeftWidth}px` }}>
                        {scrollableCols.map(col => <React.Fragment key={`scroll-${col.id}`}>{renderCell(col)}</React.Fragment>)}
                    </div>

                    <div className="flex-1 relative h-full">
                        {isMilestone ? (
                            <>
                                {item.milestoneConfig?.type === 'star' && (item.milestoneConfig.items || []).map((star, idx) => {
                                    if (!star.date) return null;
                                    const leftPos = getDateCenterX(star.date);
                                    return (
                                        <div key={`star-${idx}`} className={`absolute top-1/2 -translate-y-1/2 -translate-x-1/2 z-10 flex flex-col items-center group/mstone ${isEditMode ? 'cursor-pointer' : 'cursor-default'}`} style={{ left: `${leftPos}px` }}>
                                            <svg className="w-3.5 h-3.5 transition-transform duration-200 group-hover/mstone:scale-[1.8] group-hover/mstone:-translate-y-1" fill={star.color || '#f59e0b'} viewBox="0 0 24 24">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                            </svg>
                                            <span className="text-[8px] font-bold text-slate-700 whitespace-nowrap mt-0.5 leading-none transition-all duration-200 group-hover/mstone:scale-[1.8] group-hover/mstone:-translate-y-2 group-hover/mstone:bg-white/90 group-hover/mstone:px-1 group-hover/mstone:rounded group-hover/mstone:shadow-sm">
                                                {star.label}
                                            </span>
                                        </div>
                                    );
                                })}
                                
                                {item.milestoneConfig?.type === 'arrow' && (item.milestoneConfig.items || []).map((arrow, idx) => {
                                    if (!arrow.startDate || !arrow.endDate) return null;
                                    const sLeft = getDateCenterX(arrow.startDate);
                                    const eLeft = getDateCenterX(arrow.endDate);
                                    const aWidth = Math.max(0, eLeft - sLeft);
                                    
                                    return (
                                        <div key={`arrow-${idx}`} className={`absolute top-1/2 -translate-y-1/2 z-10 flex flex-col group/mstone ${isEditMode ? 'cursor-pointer' : 'cursor-default'}`} style={{ left: `${sLeft}px` }}>
                                            <div className="flex items-center transition-transform duration-200 group-hover/mstone:scale-105 origin-left" style={{ width: `${aWidth}px` }}>
                                                <div className="h-1 flex-1" style={{ backgroundColor: arrow.color || '#3b82f6' }}></div>
                                                <div className="w-0 h-0 border-t-[4px] border-t-transparent border-b-[4px] border-b-transparent border-l-[6px]" style={{ borderLeftColor: arrow.color || '#3b82f6' }}></div>
                                            </div>
                                            <span className="text-[8px] font-bold text-slate-700 whitespace-nowrap mt-0.5 leading-none transition-all duration-200 group-hover/mstone:scale-[1.8] origin-bottom-left group-hover/mstone:bg-white/90 group-hover/mstone:px-1 group-hover/mstone:rounded group-hover/mstone:shadow-sm absolute top-full left-0">
                                                {arrow.label}
                                            </span>
                                        </div>
                                    );
                                })}
                            </>
                        ) : (
                            localItem.startDate && localItem.endDate && (
                                <div 
                                    id={`bar-${item.id}`}
                                    className={`absolute top-1/2 -translate-y-1/2 h-5 rounded-sm shadow-sm border text-[10px] flex items-center ${isDrawingTarget ? 'ring-2 ring-indigo-500 drop-shadow-md animate-pulse' : ''} ${barTheme.bg} ${barTheme.border} ${barTheme.text} ${(dragState.active && dragState.type !== 'progress') ? 'z-20 ring-2 ring-white/50 drop-shadow-md' : 'z-10'}`}
                                    style={{ left: `${renderLeft}px`, width: `${renderWidth}px` }}
                                    title={`${item.taskName}\nStart: ${item.startDate}\nEnd: ${item.endDate}\nProgress: ${Math.round(localItem.progress || 0)}%`}
                                    onContextMenu={e => {
                                        if (isEditMode) onContextMenu(e, item.id, 'task');
                                    }}
                                >
                                    <div className={`bg-emerald-400 h-full absolute left-0 top-0 rounded-l-[1px] ${localItem.progress === 100 ? 'rounded-r-[1px]' : ''} ${dragState.type === 'progress' ? '' : 'transition-all duration-200'} z-10`} style={{ width: `${localItem.progress || 0}%` }}></div>
                                    
                                    {isEditMode && canEditProgress && (
                                        <div 
                                            className="absolute top-0 bottom-0 w-6 cursor-col-resize z-40 flex items-end justify-center group/prog pb-0 translate-y-[8px]"
                                            style={{ left: `calc(${localItem.progress || 0}% - 12px)` }}
                                            onMouseDown={e => handleInteraction(e, 'progress')}
                                            title="Adjust Progress (%)"
                                        >
                                            <div className="w-3.5 h-3.5 bg-white border border-blue-500 rounded-full shadow-sm opacity-0 group-hover:opacity-100 group-hover/prog:bg-blue-50 transition-all flex items-center justify-center">
                                                <div className="w-1.5 h-1.5 bg-blue-500 rounded-full group-hover/prog:scale-110 transition-transform"></div>
                                            </div>
                                        </div>
                                    )}

                                    {isEditMode && !item.isCalculatingParent && (
                                        <div 
                                            className="absolute left-0 top-0 bottom-0 w-4 cursor-ew-resize z-50 flex items-center justify-start group/res-l -translate-x-1" 
                                            onMouseDown={e => handleInteraction(e, 'resize-left')}
                                            title="Adjust Start Date"
                                        >
                                            <div className="w-1.5 h-3.5 bg-white border border-slate-400 rounded-[2px] shadow-sm opacity-0 group-hover:opacity-100 group-hover/res-l:border-blue-500 group-hover/res-l:bg-blue-50 transition-all flex items-center justify-center gap-[1px]">
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-l:bg-blue-500 transition-colors"></div>
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-l:bg-blue-500 transition-colors"></div>
                                            </div>
                                        </div>
                                    )}

                                    <div 
                                        className={`absolute inset-0 flex items-center px-2 truncate z-20 ${(!item.isCalculatingParent && isEditMode) ? 'cursor-grab active:cursor-grabbing' : 'cursor-default'} ${isDrawingTarget ? 'cursor-crosshair' : ''}`}
                                        onMouseDown={e => {
                                            if (!isEditMode) return;
                                            if (isDrawingTarget) handleInteraction(e, 'move');
                                            else if (!item.isCalculatingParent) handleInteraction(e, 'move');
                                        }}
                                    >
                                        {renderWidth > 30 && <span className="font-semibold drop-shadow-sm pointer-events-none select-none relative z-20 truncate block">{item.taskName} {Math.round(localItem.progress || 0)}%</span>}
                                    </div>

                                    {isEditMode && !item.isCalculatingParent && (
                                        <div 
                                            className="absolute right-0 top-0 bottom-0 w-4 cursor-ew-resize z-50 flex items-center justify-end group/res-r translate-x-1" 
                                            onMouseDown={e => handleInteraction(e, 'resize-right')}
                                            title="Adjust End Date"
                                        >
                                            <div className="w-1.5 h-3.5 bg-white border border-slate-400 rounded-[2px] shadow-sm opacity-0 group-hover:opacity-100 group-hover/res-r:border-blue-500 group-hover/res-r:bg-blue-50 transition-all flex items-center justify-center gap-[1px]">
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-r:bg-blue-500 transition-colors"></div>
                                                <div className="w-[1px] h-2 bg-slate-400 group-hover/res-r:bg-blue-500 transition-colors"></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )
                        )}
                    </div>
                </div>
            );
        };

        const GanttChart = ({ isEditMode, items, scale, onUpdateField, onAddChild, onDelete, updateDates, previewDates, collapsedIds, toggleCollapse, colWidths, setColWidths, handleAddDependency, handleRemoveDependencies, frozenColumn, setFrozenColumn, picFilter, statusFilter, handleAddNewRoot, customHolidays }) => {
            const chartRef = useRef(null);
            const scrollRef = useRef(null);
            
            const specialDatesMap = new Map((customHolidays || []).map(h => [h.date, { type: h.type || 'holiday', label: h.label }]));
            
            let visibleIds = new Set(items.map(i => i.id));
            const matchesFilter = (value, selectedValues) => selectedValues.includes('All') || selectedValues.includes(value);

            if (!picFilter.includes('All') || !statusFilter.includes('All')) {
                const matches = items.filter(i => {
                    if (i.type !== 'Job') return false;
                    let passPic = matchesFilter(i.pic, picFilter);
                    let passStatus = matchesFilter(i.status, statusFilter);
                    return passPic && passStatus;
                });
                visibleIds = new Set();
                const addAncestors = (id) => {
                    if (!id || visibleIds.has(id)) return;
                    visibleIds.add(id);
                    const item = items.find(i => i.id === id);
                    if (item && item.parentId) addAncestors(item.parentId);
                };
                const addDescendants = (id) => {
                    if (!id) return;
                    visibleIds.add(id);
                    items.filter(i => i.parentId === id).forEach(child => addDescendants(child.id));
                };
                matches.forEach(m => {
                    addAncestors(m.id);
                    addDescendants(m.id);
                });
            }

            const allDates = items.filter(i => visibleIds.has(i.id)).flatMap(i => {
                const dates = [];
                if (i.startDate) dates.push(parseDate(i.startDate));
                if (i.endDate) dates.push(parseDate(i.endDate));
                if (i.milestoneConfig && i.milestoneConfig.items) {
                    i.milestoneConfig.items.forEach(mi => {
                        if (mi.date) dates.push(parseDate(mi.date));
                        if (mi.startDate) dates.push(parseDate(mi.startDate));
                        if (mi.endDate) dates.push(parseDate(mi.endDate));
                    });
                }
                return dates;
            });

            let minDate = new Date();
            let maxDate = new Date();
            
            if (allDates.length > 0) {
                minDate = new Date(Math.min(...allDates));
                maxDate = new Date(Math.max(...allDates));
            }
            
            minDate.setDate(minDate.getDate() - 7);
            maxDate.setDate(maxDate.getDate() + 14);

            if (scale === 'week') {
                minDate.setDate(minDate.getDate() - ((minDate.getDay() + 6) % 7));
                maxDate.setDate(maxDate.getDate() + (6 - ((maxDate.getDay() + 6) % 7)));
            } else if (scale === 'month') {
                minDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
                maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0);
            }

            const totalDays = diffDays(formatDate(minDate), formatDate(maxDate));
            const scales = { day: 24, week: 10, month: 3 };
            const dayWidth = scales[scale] || 24;
            const weekWidth = 70;
            const monthWidth = 90;
            const dragDayWidth = scale === 'month' ? monthWidth / 30 : dayWidth;
            const getMonthIndex = (date) => (date.getFullYear() * 12) + date.getMonth();
            const minMonthIndex = getMonthIndex(minDate);
            const totalMonths = getMonthIndex(maxDate) - minMonthIndex + 1;
            const timelineWidth = scale === 'month' ? totalMonths * monthWidth : (totalDays + 1) * dayWidth;
            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getDateX = (dateStr) => {
                if (scale !== 'month') return diffDays(formatDate(minDate), dateStr) * dayWidth;
                const date = parseDate(dateStr);
                const monthOffset = getMonthIndex(date) - minMonthIndex;
                const dayFraction = (date.getDate() - 1) / getDaysInMonth(date);
                return (monthOffset + dayFraction) * monthWidth;
            };
            const getDateCenterX = (dateStr) => {
                if (scale !== 'month') return getDateX(dateStr) + (dayWidth / 2);
                const date = parseDate(dateStr);
                return getDateX(dateStr) + (monthWidth / getDaysInMonth(date) / 2);
            };
            const getRangeWidth = (startDate, endDate) => {
                if (scale !== 'month') return (diffDays(startDate, endDate) + 1) * dayWidth;
                return Math.max(monthWidth / 31, getDateX(addDays(endDate, 1)) - getDateX(startDate));
            };
            const getLabelStyle = (label) => ({
                left: `${label.left ?? (label.start * dayWidth)}px`,
                width: `${label.pixelWidth ?? (label.width * dayWidth)}px`
            });

            const buildTree = (parentId, level) => {
                return items
                    .filter(i => i.parentId === parentId && visibleIds.has(i.id))
                    .sort((a,b) => a.sortOrder - b.sortOrder)
                    .flatMap(item => {
                        const hasChildren = items.some(i => i.parentId === item.id && visibleIds.has(i.id));
                        const hasDependentChildren = items.some(i => i.parentId === item.id && i.type !== 'Milestone');
                        const isCollapsed = collapsedIds.includes(item.id);
                        const isCalculatingParent = hasDependentChildren && item.type !== 'Milestone';
                        const node = { ...item, level, hasChildren, isCollapsed, isCalculatingParent };
                        if (isCollapsed) return [node];
                        return [node, ...buildTree(item.id, level + 1)];
                    });
            };
            const displayItems = buildTree(null, 0);

            const pinnedOrder = displayItems.filter(i => i.isPinned).map(i => i.id);

            const headers = [];
            let currentDate = new Date(minDate);
            for (let i = 0; i <= totalDays; i++) {
                headers.push(new Date(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }

            const topLabels = [];
            const bottomLabels = [];

            if (scale === 'day') {
                let curMonth = null;
                headers.forEach((d, i) => {
                    const mKey = d.getFullYear() + '-' + d.getMonth();
                    if (!curMonth || curMonth.key !== mKey) {
                        if (curMonth) topLabels.push(curMonth);
                        curMonth = { key: mKey, label: d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), start: i, width: 1 };
                    } else {
                        curMonth.width++;
                    }
                    
                    const dStr = formatDate(d);
                    const specialDateInfo = specialDatesMap.get(dStr);
                    const sType = specialDateInfo ? specialDateInfo.type : null;
                    const isVisualHoliday = sType === 'working_day' ? false : (sType === 'holiday' ? true : (d.getDay() === 0 || d.getDay() === 6));
                    
                    bottomLabels.push({ 
                        label: d.getDate(), 
                        dayName: d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(),
                        start: i, 
                        width: 1, 
                        isHoliday: isVisualHoliday,
                        tooltip: specialDateInfo ? specialDateInfo.label : ''
                    });
                });
                if (curMonth) topLabels.push(curMonth);
            } else if (scale === 'week') {
                let curMonth = null;
                headers.forEach((d, i) => {
                    const mKey = d.getFullYear() + '-' + d.getMonth();
                    if (!curMonth || curMonth.key !== mKey) {
                        if (curMonth) topLabels.push(curMonth);
                        curMonth = { key: mKey, label: d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }), start: i, width: 1 };
                    } else {
                        curMonth.width++;
                    }
                });
                if (curMonth) topLabels.push(curMonth);

                for (let i = 0; i <= totalDays; i += 7) {
                    const weekStart = new Date(minDate);
                    weekStart.setDate(minDate.getDate() + i);
                    const wn = Math.ceil(weekStart.getDate() / 7);
                    bottomLabels.push({ label: `Week ${wn}`, start: i, width: 7, pixelWidth: weekWidth });
                }
            } else if (scale === 'month') {
                let curYear = null;
                for (let i = 0; i < totalMonths; i++) {
                    const d = new Date(minDate.getFullYear(), minDate.getMonth() + i, 1);
                    const yKey = d.getFullYear();
                    if (!curYear || curYear.key !== yKey) {
                        if (curYear) topLabels.push(curYear);
                        curYear = { key: yKey, label: d.getFullYear(), left: i * monthWidth, pixelWidth: monthWidth };
                    } else {
                        curYear.pixelWidth += monthWidth;
                    }
                    bottomLabels.push({ 
                        label: d.toLocaleDateString('en-US', { month: 'short' }), 
                        left: i * monthWidth, 
                        pixelWidth: monthWidth 
                    });
                }
                if (curYear) topLabels.push(curYear);
            }

            const totalLeftWidth = Object.values(colWidths).reduce((a, b) => a + b, 0);

            const handleResizeStart = (e, col) => {
                e.preventDefault();
                const startX = e.clientX;
                const startWidth = colWidths[col];

                const onMouseMove = (moveEvent) => {
                    const delta = moveEvent.clientX - startX;
                    setColWidths(prev => ({
                        ...prev,
                        [col]: Math.max(30, startWidth + delta)
                    }));
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            const frozenColIndex = ALL_COLUMNS.findIndex(c => c.id === frozenColumn);
            const frozenCols = ALL_COLUMNS.slice(0, frozenColIndex + 1);
            const scrollableCols = ALL_COLUMNS.slice(frozenColIndex + 1);
            
            const currentFrozenWidth = frozenCols.reduce((sum, col) => sum + colWidths[col.id], 0);
            const scrollableLeftWidth = totalLeftWidth - currentFrozenWidth;

            const todayOffset = diffDays(formatDate(minDate), getTodayStr());
            const todayLeft = getDateX(getTodayStr());

            const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
            const [drawingState, setDrawingState] = useState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
            
            const [addMenu, setAddMenu] = useState({ visible: false, x: 0, y: 0, parentId: null, parentType: null });
            const [milestoneConfigMenu, setMilestoneConfigMenu] = useState({ visible: false, taskId: null });

            const drawingRafRef = useRef(null);
            const lastMousePosRef = useRef({x: 0, y: 0});

            const isPanningRef = useRef(false);
            const panStartXRef = useRef(0);
            const panScrollLeftRef = useRef(0);

            useEffect(() => {
                const handleGlobalClick = (e) => {
                    if (!e.target.closest('.context-menu-popup')) {
                        setContextMenu({ visible: false, x: 0, y: 0, type: null, targetId: null, sourceId: null });
                        setAddMenu({ visible: false, x: 0, y: 0, parentId: null, parentType: null });
                    }
                };
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                        setDrawingState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
                        setMilestoneConfigMenu({ visible: false, taskId: null });
                    }
                };
                const handleGlobalMouseUp = () => {
                     setDrawingState(prev => {
                         if (prev.active) {
                             if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                             return { active: false, sourceId: null, currentX: 0, currentY: 0 };
                         }
                         return prev;
                     });

                     if (isPanningRef.current) {
                         isPanningRef.current = false;
                         if (scrollRef.current) {
                             scrollRef.current.style.cursor = '';
                             scrollRef.current.style.userSelect = '';
                         }
                     }
                };
                window.addEventListener('click', handleGlobalClick);
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => {
                    window.removeEventListener('click', handleGlobalClick);
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('mouseup', handleGlobalMouseUp);
                };
            }, []);

            const handleContextMenu = (e, taskId, menuType) => {
                e.preventDefault();
                if (!isEditMode) return;
                if (menuType === 'milestoneConfig') {
                    setMilestoneConfigMenu({ visible: true, taskId });
                } else {
                    setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: menuType, targetId: taskId, sourceId: null });
                }
            };

            const handleLineContextMenu = (e, sourceId, targetId) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isEditMode) return;
                setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: 'line', targetId: targetId, sourceId: sourceId });
            };
            
            const handleOpenAddMenu = (e, parentId, parentType) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isEditMode) return;
                setAddMenu({ visible: true, x: e.clientX, y: e.clientY, parentId, parentType });
            };

            const startDrawing = (sourceId) => {
                setDrawingState({ active: true, sourceId, currentX: 0, currentY: 0 });
                const scrollLoop = () => {
                    const scrollEl = scrollRef.current;
                    if (scrollEl) { 
                        const scrollRect = scrollEl.getBoundingClientRect();
                        const edgeThreshold = 80;
                        const maxSpeed = 15;
                        let speed = 0;
                        const { x: clientX, y: clientY } = lastMousePosRef.current;
                        
                        const visibleLeftEdge = scrollRect.left + Math.max(currentFrozenWidth, totalLeftWidth - scrollEl.scrollLeft);
                        
                        if (clientX > 0) { 
                            if (clientX < visibleLeftEdge + edgeThreshold) {
                                const dist = (visibleLeftEdge + edgeThreshold) - clientX;
                                speed = -Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                            } else if (clientX > scrollRect.right - edgeThreshold) {
                                const dist = clientX - (scrollRect.right - edgeThreshold);
                                speed = Math.min(maxSpeed, (dist / edgeThreshold) * maxSpeed);
                            }
                            if (speed !== 0) scrollEl.scrollBy({ left: speed });
                            
                            setDrawingState(prev => {
                                if(!prev.active) return prev;
                                return {
                                    ...prev,
                                    currentX: clientX - scrollRect.left + scrollEl.scrollLeft - totalLeftWidth,
                                    currentY: clientY - scrollRect.top + scrollEl.scrollTop - 45
                                };
                            });
                        }
                    }
                    drawingRafRef.current = requestAnimationFrame(scrollLoop);
                };
                drawingRafRef.current = requestAnimationFrame(scrollLoop);
            };

            const completeDrawing = (targetId) => {
                if (drawingRafRef.current) cancelAnimationFrame(drawingRafRef.current);
                if (drawingState.sourceId && drawingState.sourceId !== targetId) {
                    handleAddDependency(drawingState.sourceId, targetId);
                }
                setDrawingState({ active: false, sourceId: null, currentX: 0, currentY: 0 });
            };

            const handleChartMouseMove = (e) => {
                if (drawingState.active && scrollRef.current) {
                    lastMousePosRef.current = { x: e.clientX, y: e.clientY };
                    const rect = scrollRef.current.getBoundingClientRect();
                    setDrawingState(prev => ({
                        ...prev,
                        currentX: e.clientX - rect.left + scrollRef.current.scrollLeft - totalLeftWidth,
                        currentY: e.clientY - rect.top + scrollRef.current.scrollTop - 45
                    }));
                    return; 
                }

                if (isPanningRef.current && scrollRef.current) {
                    const x = e.clientX - scrollRef.current.getBoundingClientRect().left;
                    const walk = (x - panStartXRef.current); 
                    scrollRef.current.scrollLeft = panScrollLeftRef.current - walk;
                }
            };

            const handleChartMouseDown = (e) => {
                if (e.button !== 0) return; 

                const target = e.target;
                
                if (target.closest('.cursor-col-resize')) {
                    return;
                }

                if (isEditMode) {
                    if (
                        target.tagName === 'INPUT' ||
                        target.tagName === 'BUTTON' ||
                        target.tagName === 'SELECT' ||
                        target.closest('[id^="bar-"]') || 
                        target.closest('.cursor-ew-resize') || 
                        target.closest('.group\\/mstone') || 
                        target.closest('path') || 
                        target.closest('.context-menu-popup') 
                    ) {
                        return;
                    }
                }

                isPanningRef.current = true;
                panStartXRef.current = e.clientX - scrollRef.current.getBoundingClientRect().left;
                panScrollLeftRef.current = scrollRef.current.scrollLeft;
                
                scrollRef.current.style.cursor = 'grabbing';
                scrollRef.current.style.userSelect = 'none';
            };

            const getTaskCoords = (taskId, position = 'right') => {
                const index = displayItems.findIndex(i => i.id === taskId);
                if (index === -1) return null;

                const item = displayItems[index];
                if (!item.startDate || !item.endDate) return null;
                
                const left = getDateX(item.startDate);
                const width = getRangeWidth(item.startDate, item.endDate);
                
                const y = (index * 28) + 14; 
                const x = position === 'right' ? left + width : left;

                return { x, y };
            };

            const createPath = (x1, y1, x2, y2) => {
                const buffer = 15;
                if (x2 > x1 + buffer) {
                    return `M ${x1} ${y1} L ${x1 + buffer} ${y1} L ${x1 + buffer} ${y2} L ${x2} ${y2}`;
                } else {
                    const midY = y1 + (y2 - y1) / 2;
                    return `M ${x1} ${y1} L ${x1 + buffer} ${y1} L ${x1 + buffer} ${midY} L ${x2 - buffer} ${midY} L ${x2 - buffer} ${y2} L ${x2} ${y2}`;
                }
            };
            
            const renderHeaderCell = (col) => (
                <div key={`header-${col.id}`} style={{ width: `${colWidths[col.id]}px` }} className={`relative shrink-0 flex items-center group/col ${col.center ? 'justify-center' : 'px-1'}`}>
                    {isEditMode && col.id === 'taskName' && (
                        <button onClick={handleAddNewRoot} className="absolute top-0 left-0 text-blue-600 hover:text-blue-800 text-xs font-bold transition-colors z-[60] px-1 py-0.5">
                            + New Project
                        </button>
                    )}
                    <div className={`flex items-center gap-1 overflow-hidden w-full relative ${col.id === 'taskName' ? 'pt-5' : ''}`}>
                        <button 
                            onClick={(e) => { e.stopPropagation(); setFrozenColumn(col.id); }} 
                            className={`flex-none hover:text-blue-600 transition-colors ${frozenColumn === col.id ? 'text-blue-500 opacity-100' : 'text-slate-300 opacity-0 group-hover/col:opacity-100'}`}
                            title="Pin to freeze panel here"
                        >
                            <Icons.Pin />
                        </button>
                        <span className={`truncate ${col.center ? 'text-center' : ''}`}>{col.label}</span>
                    </div>
                    <div className="absolute right-0 top-0 bottom-0 w-2 -mr-1 cursor-col-resize hover:bg-blue-400/50 z-10 opacity-0 group-hover/col:opacity-100 transition-opacity" onMouseDown={e => handleResizeStart(e, col.id)}></div>
                </div>
            );

            return (
                <div className="flex flex-col h-full bg-white overflow-hidden" ref={chartRef}>
                    <div 
                        className="flex-1 overflow-auto flex relative" 
                        ref={scrollRef} 
                        onMouseMove={handleChartMouseMove}
                        onMouseDown={handleChartMouseDown}
                    >
                        <div className="min-w-max flex flex-col relative pb-32">
                            
                            <div className="flex border-b border-slate-200 bg-slate-50 sticky top-0 shadow-sm" style={{ zIndex: 60, height: '45px' }}>

                                    <div className="flex w-full text-[11px] font-bold text-slate-500 uppercase tracking-wider items-center">

                                </div>

                                <div className="flex-none bg-slate-50 border-r border-slate-200 flex items-end pb-2" style={{ width: `${scrollableLeftWidth}px`, zIndex: 64 }}>

                                        {scrollableCols.map(col => renderHeaderCell(col))}

                                </div>
                                
                                <div className="flex-1 relative bg-slate-50" style={{ width: `${timelineWidth}px`, minWidth: '100%', zIndex: 61 }}>
                                    <div className="absolute top-0 left-0 w-full h-[20px] border-b border-slate-200 bg-slate-50">

                                    </div>
                                </div>
                            </div>

                            <div className="relative">
                                <svg className="absolute top-0 pointer-events-none" style={{ left: `${totalLeftWidth}px`, width: `${timelineWidth}px`, height: '100%', zIndex: 5 }}>
                                    <defs>

                                    {displayItems.map(item => {

                                            const predItem = displayItems.find(i => i.id === predId);
                                            if (!predItem || predItem.isPinned) return null;
                                            const p1 = getTaskCoords(predId, 'right');

                                                    <path

                                                </g>

                                        (() => {

                                            if (!p1) return null;
                                            return (

                                {todayLeft > 0 && todayLeft < timelineWidth && (
                                    <div 
                                        className="absolute top-0 bottom-0 border-l-2 border-red-400 border-dashed z-30 pointer-events-none" 
                                        style={{ left: `${totalLeftWidth + todayLeft}px` }}
                                    >
